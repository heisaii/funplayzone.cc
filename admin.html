<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Draft Desk - Kick & Bass</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="site-header simple">
      <div class="brand-row">
        <a class="brand" href="./index.html"><span>Kick</span><strong>&</strong>Bass</a>
        <a class="back-link" href="./index.html">Back to site</a>
      </div>
    </header>

    <main class="admin-shell">
      <section class="editor-panel">
        <p class="eyebrow">Draft Desk</p>
        <h1>Prepare a story card</h1>
        <form id="draftForm" class="draft-form">
          <label>
            Title
            <input name="title" required placeholder="Article headline" />
          </label>
          <label>
            Section
            <select name="section">
              <option>New Music</option>
              <option>City Scenes</option>
              <option>Playlist</option>
              <option>Live</option>
              <option>Features</option>
            </select>
          </label>
          <label>
            Summary
            <textarea name="summary" rows="4" required placeholder="Short editorial summary"></textarea>
          </label>
          <label>
            Cover image
            <input name="image" type="file" accept="image/*" />
          </label>
          <label>
            Article body
            <textarea name="body" rows="9" placeholder="Paste the draft body here"></textarea>
          </label>
          <button type="submit">Preview Draft</button>
        </form>
      </section>

      <aside class="preview-panel" aria-live="polite">
        <p class="eyebrow">Preview</p>
        <article id="draftPreview" class="draft-preview">
          <div class="placeholder-image"></div>
          <span>Awaiting draft</span>
          <h2>Your story preview appears here</h2>
          <p>Add a headline, section, summary, and cover to test the card treatment.</p>
        </article>
      </aside>
    </main>

    <script src="./admin.js"></script>
  </body>
</html>
